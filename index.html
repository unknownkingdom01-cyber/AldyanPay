<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AldyanPay</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      margin: auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .tambah {
      background: green;
      color: white;
    }

    .reset {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>AldyanPay</h2>

    <h3>Saldo kamu:</h3>
    <h1>Rp <span id="saldo">0</span></h1>

    <button class="tambah" onclick="tambahSaldo()">+500</button>
    <button class="reset" onclick="resetSaldo()">Reset</button>
  </div>

  <script>
    // AMBIL DATA DARI STORAGE (BIAR TIDAK HILANG SAAT REFRESH)
    let saldo = localStorage.getItem("saldo");
    saldo = saldo ? parseInt(saldo) : 0;

    function updateSaldo() {
      document.getElementById("saldo").innerText = saldo;
      localStorage.setItem("saldo", saldo);
    }

    function tambahSaldo() {
      saldo += 500;
      updateSaldo();
    }

    function resetSaldo() {
      saldo = 0;
      updateSaldo();
      alert("Saldo sudah direset!");
    }

    // ANTI BUG / ANTI MINUS
    setInterval(() => {
      if (saldo < 0 || isNaN(saldo)) {
        saldo = 0;
        updateSaldo();
      }
    }, 500);

    updateSaldo();
  </script>

</body>
</html>
