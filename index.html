<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldyan Pay</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <h1>💳 Aldyan Pay</h1>
    <p>Kelola Keuangan Dengan Mudah</p>
</header>

<div class="container">

    <!-- RINGKASAN -->
    <div class="menu">

        <div class="card">
            <h3>📈 Pemasukan</h3>
            <p id="totalMasuk">Rp 0</p>
        </div>

        <div class="card">
            <h3>📉 Pengeluaran</h3>
            <p id="totalKeluar">Rp 0</p>
        </div>

    </div>

    <!-- TARGET TABUNGAN -->
    <div class="card">

        <h2>🎯 Target Tabungan</h2>

        <input
            type="text"
            id="namaTarget"
            placeholder="Nama Target">

        <input
            type="number"
            id="jumlahTarget"
            placeholder="Nominal Target">

        <button onclick="tambahTarget()">
            Tambah Target
        </button>

        <div id="daftarTarget"></div>

    </div>

    <!-- TRANSAKSI -->
    <div class="card">

        <h2>💸 Transaksi</h2>

        <input
            type="text"
            id="keterangan"
            placeholder="Keterangan">

        <input
            type="number"
            id="nominal"
            placeholder="Nominal">

        <select id="jenisTransaksi">
            <option value="masuk">
                📈 Pemasukan
            </option>

            <option value="keluar">
                📉 Pengeluaran
            </option>
        </select>

        <button onclick="tambahTransaksi()">
            Tambah Transaksi
        </button>

        <div id="riwayat"></div>

    </div>

    <!-- CATATAN -->
    <div class="card">

        <h2>📝 Catatan</h2>

        <textarea
            id="catatan"
            rows="5"
            placeholder="Tulis catatan keuangan di sini..."
            style="
            width:100%;
            padding:10px;
            border:none;
            border-radius:10px;
            "></textarea>

        <button onclick="simpanCatatan()">
            Simpan Catatan
        </button>

    </div>

</div>

<script src="app.js"></script>

    <div style="margin-top:20px;">
  <h2>Saldo: <span id="saldo">0</span></h2>

  <button onclick="tambahSaldo()">Tambah</button>
  <button onclick="resetSaldo()">Reset</button>
</div>

<script>
let saldo = 0;

function updateSaldo() {
  document.getElementById("saldo").innerText = saldo;
}

function tambahSaldo() {
  saldo += 10000;
  updateSaldo();
}

function resetSaldo() {
  saldo = 0;
  updateSaldo();
  alert("Saldo direset!");
}

updateSaldo();
</script>

<script>
function updateSaldo() {
  document.getElementById("saldo").innerText = saldo;
}

// TAMBAH SALDO
function tambahSaldo() {
  saldo += 10000;
  updateSaldo();
}

// RESET SALDO
function resetSaldo() {
  saldo = 0;
  updateSaldo();
  alert("Saldo direset!");
}

// KUNCI BIAR GAK BISA MINUS (ANTI BUG)
setInterval(() => {
  if (saldo < 0) {
    saldo = 0;
    updateSaldo();
  }
}, 200);
</script>
    
</body>
</html>
